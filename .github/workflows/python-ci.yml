name: Python CI (reusable)

on:
  workflow_call:
    inputs:
      python_versions:
        description: "JSON array of python versions"
        required: false
        type: string
        default: '["3.10","3.11","3.12","3.13"]'
      package_dir:
        description: "Path to package root (where pyproject.toml lives)"
        required: false
        type: string
        default: "."
      test_command:
        description: "Test command (run from package_dir)"
        required: false
        type: string
        default: "pytest -q"
      lint:
        description: "Run ruff check"
        required: false
        type: boolean
        default: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python_versions) }}
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ${{ inputs.package_dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install pytest ruff
      - name: ruff
        if: ${{ inputs.lint }}
        run: ruff check .
      - name: pytest
        run: ${{ inputs.test_command }}
