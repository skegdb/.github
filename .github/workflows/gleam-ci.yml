name: Gleam CI (reusable)

on:
  workflow_call:
    inputs:
      gleam_version:
        description: "Gleam version"
        required: false
        type: string
        default: "1.5.0"
      otp_version:
        description: "Erlang/OTP version"
        required: false
        type: string
        default: "27.0"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ inputs.otp_version }}
          gleam-version: ${{ inputs.gleam_version }}
          rebar3-version: "3"
      - run: gleam format --check src test
      - run: gleam deps download
      - run: gleam build
      - run: gleam test
