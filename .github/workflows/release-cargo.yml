name: Release to crates.io (reusable)

on:
  workflow_call:
    inputs:
      crate_path:
        description: "Path to crate dir relative to repo root"
        required: false
        type: string
        default: "."
      dry_run:
        description: "Run cargo publish --dry-run instead of publishing"
        required: false
        type: boolean
        default: false
    secrets:
      CARGO_REGISTRY_TOKEN:
        description: "crates.io API token"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo publish
        working-directory: ${{ inputs.crate_path }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish --dry-run --locked
          else
            cargo publish --locked
          fi
